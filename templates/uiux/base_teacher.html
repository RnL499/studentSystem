<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}成績管理系統{% endblock %}</title>
    <style>
        :root {
            --sidebar-width: 260px;
            --brand-dark: #1e293b;
            --brand-active: #334155;
            --bg-main: #f8fafc;
            --white: #ffffff;
            --accent: #10b981;
            --text-main: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg-main); display: flex; }
        aside { width: var(--sidebar-width); background-color: var(--brand-dark); color: white; position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 24px; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #334155; }
        nav { flex-grow: 1; }
        nav a { display: block; padding: 14px 24px; color: #94a3b8; text-decoration: none; }
        nav a:hover, nav a.active { background-color: var(--brand-active); color: white; border-left: 4px solid var(--accent); }
        .sidebar-footer { padding: 20px 24px; border-top: 1px solid #334155; }
        .sidebar-footer form button { background: none; border: 1px solid #475569; color: #cbd5e1; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        .sidebar-footer form button:hover { background: #475569; color: white; }
        main { margin-left: var(--sidebar-width); flex-grow: 1; padding: 40px; min-width: 0; }
        .uiux-messages { margin-bottom: 20px; }
        .uiux-message { padding: 12px 16px; border-radius: 6px; margin-bottom: 8px; font-size: 0.9rem; }
        .uiux-message-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .uiux-message-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .uiux-message-info { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .uiux-message-warning { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <aside>
        <div class="sidebar-header">成績管理系統</div>
        <nav>
            <a href="{% url 'create_course' %}" {% if active_nav == 'create_course' %}class="active"{% endif %}>教師：新增課程</a>
            <a href="{% url 'teacher_courses' %}" {% if active_nav == 'roster' %}class="active"{% endif %}>教師：修課名單</a>
            <a href="{% url 'teacher_grade_hub' %}" {% if active_nav == 'grades' %}class="active"{% endif %}>教師：成績管理</a>
        </nav>
        <div class="sidebar-footer">
            <p style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 8px;">{{ user.username }}</p>
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit">登出</button>
            </form>
        </div>
    </aside>
    <main>
        {% include 'uiux/includes/messages.html' %}
        {% block content %}{% endblock %}
    </main>
    {% block extra_js %}{% endblock %}
</body>
</html>
