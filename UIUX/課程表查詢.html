<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課表查詢系統 | 成績管理系統</title>
    <style>
        :root {
            --sidebar-width: 260px;
            --brand-dark: #1e293b;
            --bg-main: #f1f5f9;
            --white: #ffffff;
            --primary: #3b82f6;
            --border: #e2e8f0;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg-main); display: flex; }

        /* 側邊導覽 (LOGO) */
        aside { width: var(--sidebar-width); background-color: var(--brand-dark); color: white; position: fixed; height: 100vh; }
        .sidebar-header { padding: 30px 24px; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #334155; }
        nav a { display: block; padding: 14px 24px; color: #94a3b8; text-decoration: none; }
        nav a.active { background-color: #334155; color: white; border-left: 4px solid var(--primary); }

        /* 主內容 */
        main { margin-left: var(--sidebar-width); flex-grow: 1; padding: 40px; }
        
        /* 搜尋篩選區 */
        .search-container {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .search-input-group { position: relative; grid-column: span 2; }
        .search-input-group input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
        }

        /* 必填解釋樣式 */
        .form-item { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.9rem; margin-bottom: 8px; color: var(--brand-dark); }
        .explanation { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; line-height: 1.4; }

        select, input {
            padding: 10px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            outline: none;
            background: #fcfcfc;
        }

        .btn-search {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            align-self: flex-end;
            transition: 0.2s;
        }

        /* 搜尋結果預覽 */
        .results-card { background: var(--white); border-radius: 12px; padding: 0; overflow: hidden; }
        .results-header { padding: 20px 30px; background: #f8fafc; border-bottom: 1px solid var(--border); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px 30px; font-size: 0.85rem; color: var(--text-muted); border-bottom: 2px solid var(--border); }
        td { padding: 15px 30px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        tr:hover { background: #fdfdfd; }

        .tag { padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; background: #e0f2fe; color: #0369a1; }
    </style>
</head>
<body>

    <aside>
        <div class="sidebar-header">成績管理系統</div>
        <nav>
            <a href="#">首頁</a>
            <a href="#" class="active">查詢課表</a>
            <a href="#">選課清單</a>
        </nav>
    </aside>

    <main>
        <div class="page-header" style="margin-bottom: 25px;">
            <h1 style="font-size: 1.6rem; color: var(--brand-dark);">課程課表查詢</h1>
            <p style="color: var(--text-muted);">您可以透過系所、教師或關鍵字搜尋本學期開放的所有課程</p>
        </div>

        <div class="search-container">
            <div class="filter-grid">
                
                <div class="form-item search-input-group">
                    <label>關鍵字搜尋</label>
                    <input type="text" placeholder="輸入課程名稱或代碼...">
                    <!-- <small class="explanation">※請輸入至少兩個字。這能縮小搜尋範圍，避免系統從數千門課程中抓取過多無關資料，加速您的查詢體驗。</small> -->
                </div>

                <div class="form-item">
                    <label>查詢年度/學期<span style="color:red">*</span></label>
                    <select>
                        <option>112學年度 第2學期</option>
                        <option>112學年度 第1學期</option>
                    </select>
                    <small class="explanation">※系統需定位特定學期，以確保顯示的是當前有效的課程與排課時間。</small>
                </div>

                <div class="form-item">
                    <label>開課系所</label>
                    <select>
                        <option>請選擇系所 (全部)</option>
                        <option>資訊管理學系</option>
                        <option>多媒體設計學系</option>
                    </select>
                    <small class="explanation">※若您只想找本系的專業課程，選擇此項可過濾掉其他通識或外系選修。</small>
                </div>

                <button class="btn-search">開始查詢課程</button>
            </div>
        </div>

        <div class="results-card">
            <div class="results-header">
                <strong>搜尋結果預覽</strong> 
                <span style="color: var(--text-muted); font-size: 0.85rem; margin-left: 10px;">共找到 3 門相關課程</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>課程代碼</th>
                        <th>課程名稱</th>
                        <th>授課教師</th>
                        <th>上課時間</th>
                        <th>教室</th>
                        <th>教學規劃</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>IM3002</td>
                        <td><strong>網頁設計實務</strong></td>
                        <td>李美美</td>
                        <td>週一 13:00 - 16:00</td>
                        <td><span class="tag">計網 201</span></td>
                        <td><a href="#" style="color: var(--primary); font-size: 0.85rem; text-decoration: none; font-weight: bold;">查看教學規劃</a></td>
                    </tr>
                    <tr>
                        <td>IM3015</td>
                        <td><strong>UI/UX 介面設計</strong></td>
                        <td>王大同</td>
                        <td>週三 09:00 - 12:00</td>
                        <td><span class="tag">計網 302</span></td>
                        <td><a href="#" style="color: var(--primary); font-size: 0.85rem; text-decoration: none; font-weight: bold;">查看教學規劃</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>
